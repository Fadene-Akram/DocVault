apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-postgres
  labels:
    app: comments-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comments-postgres
  template:
    metadata:
      labels:
        app: comments-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "admin"
            - name: POSTGRES_PASSWORD
              value: "password123"
            - name: POSTGRES_DB
              value: "commentsdb"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: comments-postgres-pvc
