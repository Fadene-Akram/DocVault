apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
    spec:
      containers:
        - name: document-service
          image: dms-documents:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/documentdb"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password123"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            # Redis
            - name: REDIS_HOST
              value: "redis-service"
            # Kafka (producer + consumer)
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
            # S3 / MinIO
            - name: S3_ENDPOINT
              value: "http://minio-service:9000"
            - name: S3_PUBLIC_ENDPOINT
              value: "http://localhost:9000"
            - name: S3_ACCESS_KEY
              value: "admin"
            - name: S3_SECRET_KEY
              value: "ensia123456"
            - name: S3_BUCKET
              value: "ensia"
            - name: S3_PATH_STYLE_ACCESS
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: document-storage
              mountPath: /data/documents
      volumes:
        - name: document-storage
          persistentVolumeClaim:
            claimName: document-pvc
