spring.application.name=document
server.port=8082

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://postgres-service:5432/documentdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=password123

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Local File Storage Configuration
app.file.storage-path=/data/documents

#spring.datasource.url=jdbc:h2:mem:documentsdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# S3 Configuration
app.s3.endpoint=${S3_ENDPOINT:http://minio:9000}
app.s3.public-endpoint=${S3_PUBLIC_ENDPOINT:http://localhost:9000}
app.s3.region=${S3_REGION:us-east-1}
app.s3.access-key=${S3_ACCESS_KEY:admin}
app.s3.secret-key=${S3_SECRET_KEY:ensia123456}
app.s3.bucket=${S3_BUCKET:ensia}
app.s3.path-style-access=${S3_PATH_STYLE_ACCESS:true}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=60000

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka Consumer (translation results)
spring.kafka.consumer.group-id=documents-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map


jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012}